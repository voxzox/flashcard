<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flashcards</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 100px;
    }
    .card {
      width: 300px;
      height: 200px;
      border: 1px solid #ccc;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      padding: 20px;
      text-align: center;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
    }
  </style>
</head>

<body>

<div class="card" onclick="flipCard()">
  Loading...
</div>

<button onclick="nextCard()">Next</button>

<script>
let data = [];
let current = {};
let flipped = false;

// 👉 여기 URL 바꿔줘
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQfYNrWsEKx1sxpJZLFDV_mCpc_BPvO-zSqPSIaFB62rGJaZ9y-GE20jirJuat5nn5mlLGCOX4fKbg2/pub?output=csv";

fetch(SHEET_URL)
  .then(res => res.text())
  .then(text => {
    const rows = text.split("\n").slice(1);
    data = rows.map(row => {
      const [front, back] = row.split(",");
      return { front, back };
    });
    nextCard();
  });

function nextCard() {
  flipped = false;
  current = data[Math.floor(Math.random() * data.length)];
  document.querySelector(".card").innerText = current.front;
}

function flipCard() {
  flipped = !flipped;
  document.querySelector(".card").innerText = flipped
    ? current.back
    : current.front;
}
</script>

</body>
</html>
